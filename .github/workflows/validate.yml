name: Validate Data Repo

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  syntax-and-structure:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Validate repository
        run: npm run validate
